# Configuration for structural probing analysis

# Model configuration
model: "Qwen/Qwen3.5-0.8B"
layer: "auto"  # Auto-pick from available embedding layers
model_type: "vlm"  # vlm | vision_only | language_only

# Optional explicit layers (override `layer` when set)
# For VLMs you can set both; for unimodal, set the relevant one.
vision_layer: 6
text_layer: 12

# Output paths
output_dir: "results/structural_probing"

# On-the-fly embedding inputs
image_dir: "data/coco_images"
image_filename_column: "filepath"
text_column: "text"
cache_dir: "cache"
device: "cuda"
dtype: "bfloat16"
pooling: "mean"
batch_size: 8
max_length: 512

# Analysis parameters
n_outer_folds: 5  # Number of outer CV folds for R² evaluation (averaged across folds)
n_inner_folds: 5  # Number of inner CV folds for hyperparameter selection (averaged across folds)
train_ratio: 0.8
random_seed: 0

# Ridge regression parameters
alpha_grid: [0.001, 0.01, 0.1, 1, 10, 100, 1000]  # Grid of regularization strengths

# Dataset configuration (VG/COCO merged graphs)
dataset_hf_identifier: "helena-balabin/vg_coco_graphs_merged"
dataset_split: "train"
coco_id_column: "cocoid"

# Graph columns and targets
text_graph_columns: ["amr_graphs", "dependency_graphs"]
image_graph_columns: ["image_graphs", "action_image_graphs", "spatial_image_graphs"]
graph_targets: ["num_nodes", "num_edges", "depth"]