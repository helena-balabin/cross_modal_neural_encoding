# ──────────────────────────────────────────────────────────────
# Configuration for cross-modal embedding prediction
# See: cross_modal_neural_encoding/modeling/predict_modalities.py
# ──────────────────────────────────────────────────────────────

# ── Paths ─────────────────────────────────────────────────────
embeddings_dir: "models/embeddings"
output_dir: "outputs/predict_modalities"

# ── Optional VG-COCO mode (on-the-fly embeddings) ─────────────
# When true, ignores embeddings_dir and extracts embeddings from
# the dataset below using one random caption per image.
use_vg_coco: false
dataset_name: "helena-balabin/vg-coco-overlap"
image_dir: "coco/coco_images"
image_id_column: "imgid"
image_path_column: "filepath"
text_column: "sentences_raw"
max_samples: null
models: []
model_type: "vlm"
device: "cuda"
dtype: "bfloat16"
pooling: "mean"
batch_size: 128
max_length: 512
cache_dir: "huggingface/transformers"

# Optional: restrict to the 252 fMRI stimuli via design matrix mapping.
# Uses column 'coco_id' or 'cocoid' with values like "123_image" / "123_text".
# Leave blank to use all available COCO IDs in the embeddings.
design_matrix_mapping_file: ""

# ── Model lists ───────────────────────────────────────────────
# Provide HF identifiers or embedding folder names. If empty, auto-discover.
text_models: []
vision_models: []

# ── Layers ────────────────────────────────────────────────────
text_layer: 12
vision_layer: 6

# ── Prediction setup ─────────────────────────────────────────
# 5-fold CV with configurable regressor and Pearson r evaluation.
n_splits: 5
regressor: "mlp_relu"  # ridge | mlp_linear | mlp_relu
ridge_alpha: 1.0
random_state: 42
standardize: true
min_samples: 5

# ── MLP settings (skip-connected, 4-layer MLP) ───────────────
mlp:
  hidden_size: 256
  bias: true
  learning_rate: 0.001
  weight_decay: 0.0
  batch_size: 8
  max_epochs: 256
  patience: 8
  val_ratio: 0.1
  log_interval: 25
  device: "cuda"
