# ──────────────────────────────────────────────────────────────
# Configuration for neural encoding analysis
# See: cross_modal_neural_encoding/modeling/neural_encoding.py
# ──────────────────────────────────────────────────────────────

# ── Subjects ──────────────────────────────────────────────────
subjects:
  - "sub-07"
  - "sub-03"
  - "sub-04"
  - "sub-05"
  - "sub-06"
  - "sub-02"
  - "sub-08"
  - "sub-09"

# ── Experimental design ──────────────────────────────────────
sessions: [1, 2, 3]
runs_per_session: 12
task: "comp"

# ── Paths ─────────────────────────────────────────────────────
bids_root: "/project/def-afyshe-ab/hbalabin/comp_fmri_study_2025/bids"  # must be provided (BIDS dataset root)
glmsingle_root: "/project/def-afyshe-ab/hbalabin/comp_fmri_study_2025/glmsingle"  # must be provided (GLMsingle outputs root)
fmriprep_dir: "/project/def-afyshe-ab/hbalabin/comp_fmri_study_2025/fmriprep"  # must be provided (fMRIPrep outputs root for brain masks in T1w space)
design_matrix_mapping_file: "/project/def-afyshe-ab/hbalabin/comp_fmri_study_2025/coco/coco_252_stimuli_local/design_matrix_mapping.csv"  # required for visualization-matched NC computation
embeddings_dir: "/scratch/hbalabin/coco"         # relative to project root
output_dir: "outputs/neural_encoding"       # relative to project root

# ── VLM model & layer ────────────────────────────────────────
model: "Qwen/Qwen3.5-0.8B"
# Vision encoder: 12 layers (0-11).  Text encoder: 24 layers (0-23).
# Intermediate layers often capture more brain-aligned representations
# than the final layer.  Try: vision ~6, text ~12.
vision_layer: 6
text_layer: 12

# ── PCA on embeddings ────────────────────────────────────────
n_pca_components: 50

# ── Voxel selection by noise ceiling ─────────────────────────
# Keep top X% voxels separately for each fMRI modality (text/image)
# based on modality-specific NC. Set 0 to disable.
# NC is computed exactly as in visualize_noise_ceiling.py
# (DESIGNINFO stimorder + design_matrix_mapping_file).
nc_top_percent: 20

# ── Fractional ridge regression ──────────────────────────────
test_size: 0.2           # test set fraction for outer CV (if n_outer_folds = 1)
n_inner_folds: 5          # inner GroupKFold folds for frac tuning
n_outer_folds: 5          # >1 enables proper outer GroupKFold CV
frac_grid: [0.1, 0.25, 0.5, 0.75, 1.0]

# ── Permutation test ─────────────────────────────────────────
# Number of permutations (shuffle embedding <-> stimulus mapping).
# Set to 0 to skip.  100 gives a rough estimate; 1000+ for
# publication-quality p-values.
n_permutations: 100

# ── Events file columns ─────────────────────────────────────
modality_column: "modality"
cocoid_column: "cocoid"

# ── Encoding conditions ──────────────────────────────────────
# embed_modality: "vision" or "text"  (matches embeddings dir name)
# fmri_modality:  "image"  or "text"  (matches events modality value)
conditions:
  text_to_text:
    embed_modality: "text"
    fmri_modality: "text"
  image_to_image:
    embed_modality: "vision"
    fmri_modality: "image"
  image_to_text:
    embed_modality: "vision"
    fmri_modality: "text"
  text_to_image:
    embed_modality: "text"
    fmri_modality: "image"
