# ──────────────────────────────────────────────────────────────
# Configuration for residual encoding visualization
# See: cross_modal_neural_encoding/visualization/visualize_residual_encoding.py
# ──────────────────────────────────────────────────────────────

# Root holding the residual outputs (<model>/{summary,aggregated}.csv).
residual_root: "outputs/residual_encoding"

# Root holding the standard neural-encoding outputs, searched per model for
# the matching <model>/summary.csv (used for the residualised − standard delta).
encoding_root: "outputs/neural_encoding"

# Metric column from the summary CSV to plot.
metric: "mean_normalized_r"

# Output directory for the two combined figures.
output_dir: "reports/figures/residual_encoding"
