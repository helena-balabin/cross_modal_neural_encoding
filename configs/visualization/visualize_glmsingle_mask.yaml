# ──────────────────────────────────────────────────────────────
# Configuration for voxel-mask surface visualisation
# See: cross_modal_neural_encoding/visualization/visualize_glmsingle_mask.py
# ──────────────────────────────────────────────────────────────

# ── Mode ──────────────────────────────────────────────────────
# "r2" – threshold by Type-A on/off R² (top-k %)
# "ev" – threshold by explainable variance (top-k % of positive EV voxels)
mode: "ev"

# ── Paths (REQUIRED) ─────────────────────────────────────────
# Parent directory containing sub-* GLMSingle outputs
glmsingle_path: ""

# BIDS dataset root (required for ev mode only)
bids_root: ""

# ── Thresholds ────────────────────────────────────────────────
# Top-k percentages of positive surface vertices (one row per value).
# Same interpretation for both r2 and ev modes.
thresholds:
  - 5
  - 10
  - 15

# ── Experimental design (ev mode only) ───────────────────────
sessions: [1, 2, 3]
runs_per_session: 12
task: "comp"

# ── Output ────────────────────────────────────────────────────
# Directory to save figures (default: reports/figures/)
output_dir: null
