# Configuration for GLMSingle mask visualization

# Parent directory such as /glmsingle containing sub-* GLMSingle outputs (REQUIRED)
glmsingle_path: ""

# Top-k % of voxels to keep (by R2) – one row per percentage in the figure
# Override from CLI:  top_percentages='[5,10,20]'
top_percentages:
  - 10
  - 15
  - 20

# Optional: directory to save output figures (one per subject)
# Default: reports/figures/
output_dir: null
